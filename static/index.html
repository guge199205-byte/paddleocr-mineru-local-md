<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>PaddleOCR Local - 本地 OCR 解析工作台</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%232f6df6'/%3E%3Ctext x='32' y='42' text-anchor='middle' font-family='Arial,sans-serif' font-size='34' font-weight='700' fill='white'%3EP%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="/static/style.css?v=46">
    <script src="/static/vendor/pdfjs/pdf.min.js"></script>
    <script src="/static/vendor/pdf-lib/pdf-lib.min.js"></script>
    <link rel="stylesheet" href="/static/vendor/katex/katex.min.css">
    <script src="/static/vendor/marked/marked.min.js"></script>
    <script src="/static/vendor/katex/katex.min.js"></script>
    <script src="/static/vendor/katex/contrib/auto-render.min.js"></script>
    <script src="/static/vendor/dompurify/purify.min.js"></script>
    <link rel="stylesheet" href="/static/vendor/highlight/github.min.css">
    <script src="/static/vendor/highlight/highlight.min.js"></script>
    <script src="/static/vendor/jszip/jszip.min.js"></script>
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <div class="brand">
                <button class="icon-button" id="sidebar-toggle" title="切换侧边栏">
                    <svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
                </button>
                <div class="brand-mark">P</div>
                <div>
                    <div class="brand-name">PaddleOCR Local</div>
                    <div class="brand-subtitle">本地多模型 OCR 解析</div>
                </div>
            </div>
            <div class="topbar-actions">
                <button class="language-toggle" id="language-toggle" type="button" title="Switch language" aria-label="Switch language">
                    <span>中</span>
                    <strong>EN</strong>
                </button>
                <label class="model-select-wrap" title="Model">
                    <span>Model</span>
                    <select id="model-select" aria-label="Model"></select>
                </label>
                <div class="model-pill">
                    <span id="model-status-dot" class="dot connecting"></span>
                    <span id="model-status-text">连接模型中...</span>
                </div>
            </div>
        </header>

        <div class="workspace">
            <div class="sidebar-scrim" id="sidebar-scrim" aria-hidden="true"></div>
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-actions">
                    <button class="new-task-button" id="new-task-btn">
                        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
                        新解析
                    </button>
                    <button class="new-task-button batch-task-button" id="batch-folder-btn" title="选择一个文件夹，里面所有支持的文件会自动入队解析">
                        <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><path d="M12 11v6M9 14h6"/></svg>
                        批量解析文件夹
                    </button>
                </div>

                <details class="settings-panel">
                    <summary>
                        <span>
                            <svg viewBox="0 0 24 24"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"/><path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.05.05a2.1 2.1 0 1 1-2.97 2.97l-.05-.05a1.8 1.8 0 0 0-1.98-.36 1.8 1.8 0 0 0-1.1 1.66V21a2.1 2.1 0 1 1-4.2 0v-.08a1.8 1.8 0 0 0-1.1-1.66 1.8 1.8 0 0 0-1.98.36l-.05.05a2.1 2.1 0 1 1-2.97-2.97l.05-.05A1.8 1.8 0 0 0 4.6 15a1.8 1.8 0 0 0-1.66-1.1H3a2.1 2.1 0 1 1 0-4.2h.08A1.8 1.8 0 0 0 4.74 8.6a1.8 1.8 0 0 0-.36-1.98l-.05-.05A2.1 2.1 0 1 1 7.3 3.6l.05.05a1.8 1.8 0 0 0 1.98.36A1.8 1.8 0 0 0 10.42 2.35V2a2.1 2.1 0 1 1 4.2 0v.08a1.8 1.8 0 0 0 1.1 1.66 1.8 1.8 0 0 0 1.98-.36l.05-.05a2.1 2.1 0 1 1 2.97 2.97l-.05.05a1.8 1.8 0 0 0-.36 1.98 1.8 1.8 0 0 0 1.66 1.1H22a2.1 2.1 0 1 1 0 4.2h-.08A1.8 1.8 0 0 0 19.4 15Z"/></svg>
                            解析设置
                        </span>
                    </summary>
                    <div class="settings-grid" id="paddleocr-settings">
                        <label><input type="checkbox" id="chart-recognition-switch"> 图表解析</label>
                        <label><input type="checkbox" id="doc-unwarping-switch"> 文档矫正</label>
                        <label><input type="checkbox" id="doc-orientation-switch"> 方向识别</label>
                        <label><input type="checkbox" id="seal-recognition-switch" checked> 印章识别</label>
                        <label><input type="checkbox" id="format-content-switch" checked disabled> 内容格式化</label>
                        <label><input type="checkbox" id="formula-number-switch" checked> 公式编号</label>
                        <label><input type="checkbox" id="ignore-header-switch" checked> 忽略页眉</label>
                        <label><input type="checkbox" id="ignore-footer-switch" checked> 忽略页脚</label>
                        <label><input type="checkbox" id="ignore-number-switch" checked> 忽略页码</label>
                        <label class="setting-number">
                            <span>每批页数</span>
                            <input type="number" id="pdf-batch-size-input" min="1" max="400" step="1" value="1" inputmode="numeric">
                        </label>
                    </div>
                    <div class="settings-grid hidden" id="mineru-settings">
                        <label><input type="checkbox" id="mineru-formula-switch" checked> 公式解析</label>
                        <label><input type="checkbox" id="mineru-table-switch" checked> 表格解析</label>
                        <label><input type="checkbox" id="mineru-image-switch" checked> 图片分析</label>
                        <label>
                            <span>解析方式</span>
                            <select id="mineru-parse-method">
                                <option value="auto" selected>自动</option>
                                <option value="txt">文本模式</option>
                                <option value="ocr">OCR 模式</option>
                            </select>
                        </label>
                        <label class="setting-number">
                            <span>每批页数</span>
                            <input type="number" id="pdf-batch-size-input-mineru" min="1" max="400" step="1" value="1" inputmode="numeric">
                        </label>
                    </div>
                    <div class="settings-grid hidden" id="glm-ocr-settings">
                        <label><input type="checkbox" id="glm-ocr-layout-switch" checked> 版面检测（PP-OCRv6）</label>
                        <label class="setting-number">
                            <span>每批页数</span>
                            <input type="number" id="pdf-batch-size-input-glm-ocr" min="1" max="400" step="1" value="1" inputmode="numeric">
                        </label>
                    </div>
                </details>

                <div class="task-tabs">
                    <button class="task-tab active" data-filter="all">最近上传</button>
                    <button class="task-tab" data-filter="done">已完成</button>
                </div>
                <div class="folder-bar">
                    <button class="icon-button" id="new-folder-btn" title="新建文件夹">
                        <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><path d="M12 11v4M10 13h4"/></svg>
                    </button>
                    <select id="folder-select" aria-label="文件夹">
                        <option value="">全部文件</option>
                    </select>
                </div>
                <div class="task-tools">
                    <div class="search-box">
                        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
                        <input id="task-search" placeholder="搜索文件">
                    </div>
                    <button class="icon-button danger" id="clear-history-btn" title="清空历史">
                        <svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M6 6l1 15h10l1-15"/></svg>
                    </button>
                </div>
                <div class="task-list" id="task-list"></div>
            </aside>

            <main class="document-workbench">
                <div class="mobile-pane-switch" role="tablist" aria-label="切换源文件 / 解析结果">
                    <button type="button" class="mobile-pane-tab active" data-pane="source" role="tab" aria-selected="true">
                        <svg viewBox="0 0 24 24"><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M14 3v6h6"/></svg>
                        <span>源文件</span>
                    </button>
                    <button type="button" class="mobile-pane-tab" data-pane="result" role="tab" aria-selected="false">
                        <svg viewBox="0 0 24 24"><path d="M9 11h6M9 15h4M7 3h7l5 5v11a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M14 3v5h5"/></svg>
                        <span>解析结果</span>
                    </button>
                </div>

                <section class="source-pane">
                    <div class="pane-header">
                        <div>
                            <div class="pane-kicker">源文件</div>
                            <h2 id="source-title">等待上传文件</h2>
                        </div>
                        <div class="source-meta" id="source-meta">PDF、图片、Office 文档</div>
                    </div>
                    <div class="source-viewer" id="source-viewer">
                        <div class="drop-zone" id="drop-zone">
                            <svg viewBox="0 0 24 24"><path d="M12 3v12M7 8l5-5 5 5M4 15v4a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-4"/></svg>
                            <h3>拖拽文件到这里</h3>
                            <p>支持 PDF、图片、PPT/PPTX、DOC/DOCX；PDF 会逐页解析。</p>
                            <button class="primary-button" id="browse-btn">选择文件</button>
                        </div>
                    </div>
                    <div class="pdf-controls hidden" id="pdf-controls">
                        <button class="icon-button" id="prev-page-btn" title="上一页">
                            <svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
                        </button>
                        <span id="page-indicator">1 / 1</span>
                        <button class="icon-button" id="next-page-btn" title="下一页">
                            <svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
                        </button>
                        <button class="icon-button" id="zoom-out-btn" title="缩小">
                            <svg viewBox="0 0 24 24"><path d="M5 12h14"/></svg>
                        </button>
                        <button class="icon-button" id="zoom-in-btn" title="放大">
                            <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
                        </button>
                        <button class="icon-button" id="reset-zoom-btn" title="100%">
                            <svg viewBox="0 0 24 24"><path d="M4 4v6h6"/><path d="M20 20v-6h-6"/><path d="M5 19A8 8 0 0 0 19 5"/></svg>
                        </button>
                    </div>
                </section>

                <section class="result-pane">
                    <div class="pane-header result-header">
                        <div class="result-header-main">
                            <div class="result-heading">
                                <div class="pane-kicker">解析模型 <span class="model-name" id="active-model-name">PaddleOCR-VL-1.6</span></div>
                                <h2 id="result-title">解析结果</h2>
                            </div>
                            <div class="result-actions">
                                <button class="secondary-button" id="start-btn">
                                    <svg viewBox="0 0 24 24"><path d="m8 5 11 7-11 7V5Z"/></svg>
                                    开始解析
                                </button>
                                <button class="icon-button has-mobile-label" id="copy-btn" title="复制 Markdown" aria-label="复制 Markdown">
                                    <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                                    <span class="btn-mobile-label">复制</span>
                                </button>
                                <button class="icon-button has-mobile-label" id="download-btn" title="下载结果" aria-label="下载结果">
                                    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5M12 15V3"/></svg>
                                    <span class="btn-mobile-label">下载</span>
                                </button>
                                <button class="icon-button danger has-mobile-label" id="clear-result-btn" title="清空解析结果" aria-label="清空解析结果" style="display:none;">
                                    <svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14"/></svg>
                                    <span class="btn-mobile-label">清空</span>
                                </button>
                                <button class="icon-button has-mobile-label" id="translate-btn" title="翻译" aria-label="翻译" style="display:none;">
                                    <svg viewBox="0 0 24 24"><path d="M12.87 15.07l-2.54-2.51.03-.03A17.52 17.52 0 0014.07 6H17V4h-7V2H8v2H1v1.99h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/></svg>
                                    <span class="btn-mobile-label">翻译</span>
                                </button>
                            </div>
                        </div>
                        <div class="view-tabs">
                            <button class="view-tab active" data-view="markdown">文档解析</button>
                            <button class="view-tab" data-view="json">JSON</button>
                        </div>
                    </div>
                    <div class="result-viewer">
                        <div class="markdown-preview" id="markdown-view">
                            <div class="empty-result">选择左侧任务，或上传一个新文件开始解析。</div>
                        </div>
                        <div class="json-preview hidden" id="json-view"></div>
                    </div>
                </section>
            </main>
        </div>

        <input type="file" id="file-input" multiple accept=".pdf,.png,.jpg,.jpeg,.bmp,.webp,.tiff,.tif,.gif,.ppt,.pptx,.doc,.docx" hidden>
        <!-- Hidden directory picker for the "batch parse folder" feature.
             webkitdirectory makes the browser show a directory picker; the
             FileList it returns includes every file under the folder. -->
        <input type="file" id="folder-input" webkitdirectory directory multiple hidden>
    </div>

    <template id="task-item-template">
        <div class="task-item" role="button" tabindex="0" draggable="true">
            <span class="task-icon"></span>
            <span class="task-main">
                <span class="task-name"></span>
                <span class="task-meta"></span>
            </span>
            <span class="task-state"></span>
            <button class="task-delete" type="button" title="删除任务" aria-label="删除任务">
                <svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v5M14 11v5"/></svg>
            </button>
        </div>
    </template>

    <script charset="UTF-8" src="/static/i18n.js?v=2"></script>
    <script charset="UTF-8" src="/static/app.js?v=104"></script>
</body>
</html>
